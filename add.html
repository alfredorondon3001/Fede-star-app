<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0a1e">
<title>⭐ Adding star…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FFD93D;--pink:#FF6B9D;--teal:#4ECDC4;--bg:#0f0a1e}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

.wrap{position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;gap:1.25rem;max-width:320px}

/* spinner shown while loading */
.spinner{width:56px;height:56px;border:4px solid rgba(255,255,255,0.08);
  border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* big star */
.star-el{display:none;width:clamp(130px,40vw,200px);height:clamp(130px,40vw,200px);
  position:relative}
.star-el.show{display:block;animation:star-in 0.55s cubic-bezier(0.34,1.56,0.64,1) both}
.star-el svg{width:100%;height:100%;filter:drop-shadow(0 0 28px rgba(255,217,61,0.65))}
.ring{position:absolute;inset:-18px;border-radius:50%;
  border:2px solid rgba(255,217,61,0.5);opacity:0;
  animation:ring-out 1.1s ease-out infinite}
.ring:nth-child(2){animation-delay:0.4s}
.ring:nth-child(3){animation-delay:0.8s}
@keyframes ring-out{
  0%{transform:scale(0.5);opacity:0.7}100%{transform:scale(1.7);opacity:0}}
@keyframes star-in{
  from{opacity:0;transform:scale(0.15) rotate(-25deg)}
  to{opacity:1;transform:scale(1) rotate(0)}}

/* particles */
.particle{position:fixed;width:10px;height:10px;border-radius:50%;
  pointer-events:none;z-index:2;animation:fly 0.7s ease-out forwards}
@keyframes fly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

.msg{font-size:clamp(1.5rem,7vw,2.2rem);font-weight:900;line-height:1.2}
.msg .name{color:var(--gold)}
.sub{font-size:clamp(0.88rem,3.5vw,1.05rem);color:rgba(255,255,255,0.45);
  font-weight:700;line-height:1.5}

.error-msg{font-size:0.95rem;color:#ff8a8a;font-weight:700;line-height:1.5}
.retry-btn{margin-top:0.75rem;padding:0.65rem 1.5rem;border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);background:transparent;color:#fff;
  font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer}
.setup-btn{margin-top:0.5rem;padding:0.65rem 1.5rem;border-radius:999px;
  border:none;background:var(--gold);color:var(--bg);
  font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:900;cursor:pointer}

/* tiny corner cog, always available */
.cog{position:fixed;top:0.9rem;right:0.9rem;z-index:60;width:34px;height:34px;
  border-radius:50%;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.35);
  font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* settings panel (mirrors index.html) */
#panel{display:none;position:fixed;inset:0;z-index:100;background:rgba(15,10,30,0.98);
  flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;gap:0.9rem;overflow-y:auto}
#panel.open{display:flex}
.panel-title{font-size:1.3rem;font-weight:900;color:var(--gold);margin-bottom:0.25rem}
.panel-lbl{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;
  color:rgba(255,255,255,0.4);align-self:flex-start;width:100%;max-width:300px}
.panel-input{width:100%;max-width:300px;padding:0.65rem 1rem;border-radius:12px;
  border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);
  color:#fff;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700}
.panel-input:focus{outline:none;border-color:var(--gold)}
.panel-save{width:100%;max-width:300px;padding:0.8rem;border-radius:999px;border:none;
  background:var(--pink);color:#fff;font-family:'Nunito',sans-serif;
  font-size:0.98rem;font-weight:900;cursor:pointer;margin-top:0.25rem}
.panel-note{font-size:0.7rem;color:rgba(255,255,255,0.25);max-width:280px;
  text-align:center;line-height:1.5}
.panel-close{position:absolute;top:1rem;right:1rem;background:none;border:none;
  color:rgba(255,255,255,0.3);font-size:1.3rem;cursor:pointer;padding:0.5rem}
.panel-saved-msg{font-size:0.85rem;color:var(--teal);font-weight:700;display:none}

@media(prefers-reduced-motion:reduce){
  .star-el.show,.ring{animation:none;opacity:1}
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<button class="cog" id="cogBtn" aria-label="Settings">⚙️</button>

<div class="wrap" id="wrap">
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msgEl"><span style="color:rgba(255,255,255,0.3)">Adding star…</span></div>
  <div class="sub" id="subEl"></div>
</div>

<!-- Settings panel: lets this exact browser context (Safari or standalone app) store its own token -->
<div id="panel" role="dialog" aria-modal="true" aria-label="Settings">
  <button class="panel-close" id="panelClose">✕</button>
  <div class="panel-title">⚙️ Settings</div>
  <div class="panel-lbl">GitHub username</div>
  <input class="panel-input" id="inUser" placeholder="alfredorondon3001">
  <div class="panel-lbl">Repository name</div>
  <input class="panel-input" id="inRepo" placeholder="Fede-star-app">
  <div class="panel-lbl">GitHub token (contents: read & write)</div>
  <input class="panel-input" id="inToken" type="password" placeholder="github_pat_…">
  <div class="panel-lbl">Child's name</div>
  <input class="panel-input" id="inName" placeholder="Federico">
  <button class="panel-save" id="saveBtn">Save</button>
  <p class="panel-saved-msg" id="savedMsg">✓ Saved to this app</p>
  <p class="panel-note">This saves the token only inside this exact app/browser context. If you use both Safari and a saved Home Screen icon, each needs its own setup.</p>
</div>

<script>
const CFG_KEY  = 'starchart_cfg';
const DATA_FILE = 'data.json';
const STATUS_PAGE = 'index.html';

function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); }catch{ return {}; } }
function saveCfg(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }
let cfg = loadCfg();

// ── settings panel wiring ───────────────────────────────
document.getElementById('cogBtn').addEventListener('click', ()=>{
  document.getElementById('inUser').value =cfg.user||'';
  document.getElementById('inRepo').value =cfg.repo||'';
  document.getElementById('inToken').value=cfg.token||'';
  document.getElementById('inName').value =cfg.name||'Federico';
  document.getElementById('savedMsg').style.display='none';
  document.getElementById('panel').classList.add('open');
});
document.getElementById('panelClose').addEventListener('click', ()=>{
  document.getElementById('panel').classList.remove('open');
});
document.getElementById('saveBtn').addEventListener('click', ()=>{
  cfg.user  = document.getElementById('inUser').value.trim();
  cfg.repo  = document.getElementById('inRepo').value.trim();
  cfg.token = document.getElementById('inToken').value.trim();
  cfg.name  = document.getElementById('inName').value.trim()||'Federico';
  saveCfg(cfg);
  document.getElementById('savedMsg').style.display='block';
  // restore the normal wrap UI and retry adding the star
  document.getElementById('wrap').innerHTML = `
    <div class="spinner" id="spinner"></div>
    <div class="msg" id="msgEl"><span style="color:rgba(255,255,255,0.3)">Adding star…</span></div>
    <div class="sub" id="subEl"></div>`;
  setTimeout(()=>{
    document.getElementById('panel').classList.remove('open');
    addStar();
  }, 600);
});

async function ghFetch(path, method='GET', body=null){
  const h={
    'Authorization':`token ${cfg.token}`,
    'Accept':'application/vnd.github+json',
    'X-GitHub-Api-Version':'2022-11-28'
  };
  if(body) h['Content-Type']='application/json';
  const r = await fetch(
    `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`,
    {method, headers:h, body: body?JSON.stringify(body):null}
  );
  if(!r.ok){ const e=await r.json(); throw new Error(e.message||r.status); }
  return r.json();
}

function showStar(){
  const s=document.createElement('div'); s.className='star-el';
  s.innerHTML=`<div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Star">
      <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#FFD93D"/>
    </svg>`;
  document.getElementById('spinner').replaceWith(s);
  requestAnimationFrame(()=>s.classList.add('show'));
  spawnParticles();
}

function spawnParticles(){
  const colors=['#FFD93D','#FF6B9D','#4ECDC4','#FFE66D','#FF8E53','#fff'];
  const cx=innerWidth/2, cy=innerHeight/2;
  for(let i=0;i<18;i++){
    const p=document.createElement('div'); p.className='particle';
    const angle=(i/18)*Math.PI*2;
    const dist=60+Math.random()*80;
    p.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;
      animation-delay:${i*0.025}s;animation-duration:${0.6+Math.random()*0.2}s`;
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove(),{once:true});
  }
}

function showError(msg){
  document.getElementById('wrap').innerHTML=`
    <div class="error-msg">😕 ${msg}</div>
    <button class="retry-btn" onclick="location.reload()">Try again</button>`;
}

async function addStar(){
  if(!cfg.token||!cfg.user||!cfg.repo){
    document.getElementById('spinner').style.display='none';
    document.getElementById('wrap').innerHTML=`
      <div class="error-msg">😕 Not set up yet in this app.</div>
      <button class="setup-btn" id="setupBtn">⚙️ Set up now</button>`;
    document.getElementById('setupBtn').addEventListener('click', ()=>{
      document.getElementById('inUser').value ='';
      document.getElementById('inRepo').value ='';
      document.getElementById('inToken').value='';
      document.getElementById('inName').value ='Federico';
      document.getElementById('savedMsg').style.display='none';
      document.getElementById('panel').classList.add('open');
    });
    return;
  }

  let data, sha;
  try{
    const res = await ghFetch(DATA_FILE);
    data = JSON.parse(atob(res.content.replace(/\n/g,'')));
    sha  = res.sha;
  }catch(e){
    if(e.message.includes('404')||e.message.includes('Not Found')){
      data = { stars:0, name: cfg.name||'Federico', lastAdded:null, redemptions:[] };
      sha  = null;
    } else {
      showError('Could not reach GitHub:<br>'+e.message); return;
    }
  }

  const name = data.name||'Federico';
  data.stars = (data.stars||0) + 1;
  data.lastAdded = new Date().toISOString();
  const stars = data.stars;

  try{
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const body = { message:`+1 star for ${name} (total: ${stars})`, content };
    if(sha) body.sha = sha;
    await ghFetch(DATA_FILE,'PUT', body);
  }catch(e){ showError('Could not save:<br>'+e.message); return; }

  showStar();
  document.getElementById('msgEl').innerHTML=
    `<span class="name">${name}</span> gets a ⭐`;
  document.getElementById('subEl').textContent=
    `${stars} star${stars===1?'':'s'} collected in total`;

  setTimeout(()=>{ location.href = STATUS_PAGE; }, 2600);
}

// ── starfield ─────────────────────────────────────────────
(()=>{
  const c=document.getElementById('canvas'),ctx=c.getContext('2d');
  let W,H,st=[];
  const resize=()=>{ W=c.width=innerWidth;H=c.height=innerHeight;init(); };
  const init=()=>{ st=[]; for(let i=0;i<70;i++) st.push({
    x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.3,
    op:Math.random(),dop:(Math.random()*0.007+0.003)*(Math.random()<0.5?1:-1)
  }); };
  const draw=()=>{
    ctx.clearRect(0,0,W,H);
    st.forEach(s=>{ s.op+=s.dop;if(s.op>1||s.op<0)s.dop*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.op.toFixed(2)})`;ctx.fill(); });
    requestAnimationFrame(draw);
  };
  window.addEventListener('resize',resize);resize();draw();
})();

addStar();
</script>
</body>
</html>
